appId: com.printpoz.photoeditor
productName: Photo Editor
copyright: Copyright © 2026 Printpoz
extends: null


# IMPORTANT: buildResources must NOT be the default "build" dir — that name is used by
# Create React App for the renderer output. Keep installer assets (icons) separate.
directories:
  output: release
  buildResources: build-resources

files:
  - dist-electron/**/*
  - build/**/*
  - package.json

asar: true

# Add real icons at build-resources/icon.ico (Win) and build-resources/icon.icns (Mac)
# before public release; electron-builder uses a default Electron icon if omitted.
win:
  icon: build-resources/icon.png
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  icon: build-resources/icon.png
  target:
    - dmg
  category: public.app-category.graphics-design
  # UNSIGNED build (no Apple Developer cert yet). `identity: null` tells
  # electron-builder to skip codesigning — without it, hardened-runtime signing
  # aborts on Apple-Silicon CI runners (exit code 134). hardenedRuntime +
  # entitlements are only meaningful WITH a signing identity, so they're disabled
  # while unsigned. When you get a Developer ID cert: remove `identity: null`,
  # re-enable the three lines below, set notarize:true, and add the CSC_/APPLE_ env
  # vars in CI (notarization then runs automatically).
  identity: null
  # hardenedRuntime: true
  # entitlements: build-resources/entitlements.mac.plist
  # entitlementsInherit: build-resources/entitlements.mac.plist
  notarize: false

linux:
  icon: build-resources/icon.png
  target:
    - AppImage
  category: Graphics

# Auto-update feed. electron-updater reads latest.yml / latest-mac.yml / latest-linux.yml
# from the GitHub Release for this repo. FILL IN owner/repo before releasing.
# Not active until initAutoUpdater() is uncommented in electron/main/index.ts.
publish:
  provider: github
  owner: Mihirprajapati563
  repo: printpoz-update-test
  # electron-builder defaults releaseType to "draft" — but electron-updater CANNOT
  # read draft releases (assets aren't public), so the update check 404s and nothing
  # downloads. "release" publishes immediately so the feed is live.
  releaseType: release
